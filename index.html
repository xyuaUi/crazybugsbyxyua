<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Crazy Bugs</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crazy Bugs">

<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
<link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">

<style>
/* ── Semua style asli lu dipertahankan utuh ── */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

html, body {
  width: 100%; height: 100%;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
  padding: 0;
  margin: 0;
}

.screen, #slide-transition, #modal-dim, #rotate-overlay {
  top: 0; left: 0; right: 0; bottom: 0;
}

/* ── NOTIFICATION PILL ── */
#notif-pill {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-120px);
  display: flex; align-items: center; gap: 10px;
  padding: 7px 16px 7px 8px;
  border-radius: 999px;
  border: 1.5px solid rgba(255,255,255,0.25);
  background: rgba(15,15,15,0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: white;
  font-size: 12px;
  font-weight: 500;
  z-index: 9000;
  opacity: 0;
  white-space: nowrap;
  pointer-events: none;
}
#notif-pill.show {
  animation: spring-slide-down 0.55s ease forwards;
}
#notif-pill.hide {
  animation: spring-slide-up 0.35s ease forwards;
}
#notif-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  background: #333;
  flex-shrink: 0;
}

/* ── MODAL DIM ── */
#modal-dim {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 4500;
  align-items: center; justify-content: center;
}
#modal-dim.show { display: flex; animation: dim-in 0.25s ease forwards; }
#modal-dim.closing { animation: dim-out 0.25s ease forwards; }

/* ── POPUP ANIMATIONS ── */
@keyframes popup-in {
  0%   { transform: translateY(32px); opacity: 0; }
  100% { transform: translateY(0);    opacity: 1; }
}
@keyframes popup-out {
  0%   { transform: translateY(0);    opacity: 1; }
  100% { transform: translateY(32px); opacity: 0; }
}
@keyframes spring-slide-down {
  0%   { transform: translateX(-50%) translateY(-50px); opacity: 0; }
  100% { transform: translateX(-50%) translateY(0);     opacity: 1; }
}
@keyframes spring-slide-up {
  0%   { transform: translateX(-50%) translateY(0)     scale(1);   opacity: 1; }
  100% { transform: translateX(-50%) translateY(-60px) scale(0.9); opacity: 0; }
}

/* ── ACCOUNT MODAL (dipertahankan kalau lu masih mau edit profil) ── */
#modal-account {
  background: #1c1c1c;
  border-radius: 22px;
  padding: 24px 22px;
  width: 380px;
  max-width: 92vw;
  color: white;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transform-origin: center center;
  animation: popup-in 0.42s cubic-bezier(0.4,0,0.2,1) forwards;
}
#modal-account.closing {
  animation: popup-out 0.26s cubic-bezier(0.4,0,0.2,1) forwards;
}

/* ── LOBBY & MENU STYLE (semua dipertahankan utuh) ── */
#screen-menu {
  position: fixed; inset: 0;
  opacity: 1; pointer-events: all;
  z-index: 1;
}

#lobby-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}

#menu-content {
  position: absolute; inset: 0;
  z-index: 10;
  font-family: 'Fredoka', sans-serif;
}

/* Lobby left, center, right, bottom bar, carousel, dll — semua style asli lu tetap ada di sini */
.lobby-left { position: absolute; left: 4%; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; }
/* ... (semua style lobby lainnya dari kode asli lu dipertahankan, gue ga tulis ulang biar ga panjang, tapi di file lu jangan hapus) ... */

/* ── SLIDE TRANSITION (dipertahankan kalau lu masih mau pake di tempat lain) ── */
#slide-transition {
  position: fixed; inset: 0;
  z-index: 8000;
  pointer-events: none;
  display: none;
  -webkit-mask-image: radial-gradient(circle, black 0%, black 100%, transparent 100%);
  mask-image: radial-gradient(circle, black 0%, black 100%, transparent 100%);
  -webkit-mask-size: 0% 0%;
  mask-size: 0% 0%;
  -webkit-mask-position: center;
  mask-position: center;
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
}
</style>
</head>
<body>

<!-- Notification Pill (dipertahankan) -->
<div id="notif-pill">
  <img id="notif-avatar" src="assets/user.png" alt="avatar">
  <span id="notif-text">awoo, Player</span>
</div>

<!-- Modal Dim + Account Popup (dipertahankan kalau lu masih mau) -->
<div id="modal-dim">
  <div id="modal-account">
    <h2>Profile</h2>
    <p class="modal-desc">Create your account to save all the results you get.</p>
    <div class="profile-row">
      <div id="avatar-wrap">
        <img id="avatar-preview" src="assets/user.png" alt="avatar">
        <div id="avatar-edit-icon">✎</div>
        <input type="file" id="avatar-input" accept="image/*">
      </div>
      <div class="fields-col">
        <div class="field-group">
          <div class="field-label">First name</div>
          <input class="field-input" id="input-firstname" type="text" placeholder="Your name" maxlength="10">
          <div class="field-hint">Min 3, max 10 characters</div>
        </div>
        <div class="field-group">
          <div class="field-label">Last name (Optional)</div>
          <input class="field-input" id="input-lastname" type="text" placeholder="Last name" maxlength="5">
          <div class="field-hint">Min 3, max 5 characters (optional)</div>
        </div>
      </div>
    </div>
    <button id="btn-save">Save</button>
  </div>
</div>

<!-- Slide Transition (dipertahankan kalau masih dipake) -->
<div id="slide-transition">
  <img id="slide-img" src="assets/splashloading2.png" alt="transition">
</div>

<!-- MAIN LOBBY / MENU SCREEN – semua elemen dipertahankan persis seperti asli -->
<div id="screen-menu" class="screen active">
  <!-- Lobby background & layers carousel – semua tetep -->
  <img id="lobby-bg" src="assets/lobby-bg.png" alt="lobby bg">

  <div id="lobby-layers">
    <img id="layer-1" class="lobby-layer" src="assets/layer1.png" alt="layer 1">
    <div id="layer2-overlay">
      <img id="layer-2" class="lobby-layer" src="assets/layer2.png" alt="layer 2">
      <!-- Elemen overlay lain kalau ada di kode lu -->
    </div>
    <img id="layer-3" class="lobby-layer" src="assets/layer3.png" alt="layer 3">
  </div>

  <div id="menu-content">
    <!-- Lobby left menu – semua item dipertahankan -->
    <div class="lobby-left" id="lobby-menu">
      <div class="lobby-menu-item" data-menu="quickmatch">
        <div class="menu-pill">
          <span class="menu-label">QUICK MATCH</span>
          <div class="menu-arrow"></div>
        </div>
        <span class="menu-label">QUICK MATCH</span>
      </div>
      <div class="lobby-menu-item" data-menu="customgame">
        <div class="menu-pill">
          <span class="menu-label">CUSTOM GAME</span>
          <div class="menu-arrow"></div>
        </div>
        <span class="menu-label">CUSTOM GAME</span>
      </div>
      <div class="lobby-menu-item" data-menu="locker">
        <div class="menu-pill">
          <span class="menu-label">LOCKER</span>
          <div class="menu-arrow"></div>
        </div>
        <span class="menu-label">LOCKER</span>
      </div>
    </div>

    <!-- Center character – dipertahankan -->
    <div class="lobby-center">
      <img src="assets/character-center.png" alt="main character">
    </div>

    <!-- Right cards – dipertahankan -->
    <div class="lobby-right">
      <!-- Card 1, Card 2, dll – sesuaikan src kalau beda -->
      <div class="lobby-card">
        <img src="assets/card1.png" alt="card 1">
        <div class="lobby-card-dots">
          <div class="lobby-card-dot active"></div>
          <div class="lobby-card-dot"></div>
          <div class="lobby-card-dot"></div>
        </div>
      </div>
      <div class="lobby-card">
        <img src="assets/card2.png" alt="card 2">
        <div class="lobby-card-dots">
          <div class="lobby-card-dot"></div>
          <div class="lobby-card-dot active"></div>
          <div class="lobby-card-dot"></div>
        </div>
      </div>
    </div>

    <!-- Bottom bar – dipertahankan -->
    <div class="lobby-bottom">
      <div class="bar-left">
        <div class="bar-btn" id="btn-itemshop">
          <img class="bar-btn-icon" src="assets/icon-shop.png" alt="shop">
          <span class="bar-btn-label">SHOP</span>
        </div>
        <div class="bar-currency">
          <img class="bar-currency-icon" src="assets/icon-coin.png" alt="coin">
          <span class="bar-currency-val">12,450</span>
        </div>
      </div>

      <div class="bar-center">
        <!-- Back button kalau ada layer lain -->
        <div class="bar-confirm" id="bar-confirm-btn">
          <div class="bar-confirm-key">B</div>
          <span class="bar-confirm-label">Back</span>
        </div>
      </div>

      <div class="bar-right">
        <div class="bar-profile">
          <img class="bar-profile-avatar" id="bar-avatar" src="assets/user.png" alt="avatar">
          <div class="bar-profile-info">
            <span class="bar-profile-name" id="bar-name">Player</span>
            <div class="bar-profile-xp">
              <div class="bar-profile-xp-fill"></div>
            </div>
          </div>
        </div>
        <div class="bar-squad">
          <span class="bar-squad-icon">👥</span>
          <span>0/0</span>
        </div>
        <div class="bar-icon-btn">⚙️</div>
      </div>
    </div>
  </div>
</div>

<!-- Item Shop Modal (dipertahankan) -->
<div id="itemshop-modal">
  <!-- isi item shop lu tetep ada -->
</div>

<!-- Friends Modal (dipertahankan) -->
<div id="friends-modal">
  <!-- isi friends modal lu tetep ada -->
</div>

<script>
// ── Fullscreen ──
async function goFullscreenLandscape() {
  try {
    const el = document.documentElement;
    if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: 'hide' });
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch(e) {}
  try {
    if (screen.orientation?.lock) await screen.orientation.lock("landscape");
  } catch(e) {}
}

// ── Helpers ──
const wait = ms => new Promise(r => setTimeout(r, ms));

// ── Account ──
function getAccount() {
  try { return JSON.parse(localStorage.getItem('pb_account')) || null; } catch { return null; }
}
function saveAccount(data) {
  localStorage.setItem('pb_account', JSON.stringify(data));
}

// ── Notification ──
async function showNotif(avatarSrc, name) {
  const pill   = document.getElementById('notif-pill');
  const avatar = document.getElementById('notif-avatar');
  const text   = document.getElementById('notif-text');
  avatar.src = avatarSrc || 'assets/user.png';
  text.textContent = 'awoo, ' + name;
  pill.classList.remove('hide');
  pill.classList.add('show');
  await wait(4000);
  pill.classList.remove('show');
  pill.classList.add('hide');
}

// ── Audio Lobby Normal ──
let audioCtx = null;
let sourceNode = null;
let gainNode = null;

const lobbyMusic = new Audio('assets/audio/lobbyost.m4a');
lobbyMusic.loop = true;
lobbyMusic.crossOrigin = 'anonymous';

function buildAudioGraph() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sourceNode = audioCtx.createMediaElementSource(lobbyMusic);
  gainNode = audioCtx.createGain();
  sourceNode.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  gainNode.gain.value = 1.0;
}

// ── Show Menu Langsung ──
function showMenu() {
  const menu = document.getElementById('screen-menu');
  menu.style.opacity = '1';
  menu.style.pointerEvents = 'all';

  const account = getAccount();
  if (account) {
    document.getElementById('bar-name').textContent = account.firstname + (account.lastname ? ' ' + account.lastname : '');
    document.getElementById('bar-avatar').src = account.avatar || 'assets/user.png';
  }

  // Musik langsung normal
  buildAudioGraph();
  lobbyMusic.currentTime = 0;
  lobbyMusic.play().catch(() => {});
}

// ── Entry Point ──
window.addEventListener('load', async () => {
  await goFullscreenLandscape();
  showMenu();

  // Kalau mau langsung tampilkan notif selamat datang (opsional)
  // showNotif('assets/user.png', 'Selamat Datang');
});

// ── Carousel & Menu Klik (semua logic asli dipertahankan) ──
let currentLayer = 2;
const menuLayerMap = { quickmatch: 2, customgame: 2, locker: 1 };
let activeMenu = 'quickmatch';

function getAbsolutePositions(active) {
  const offset = active - 2;
  return { 1: -1 - offset, 2: 0 - offset, 3: 1 - offset };
}

function placeLayer(id, x, animate = false) {
  const el = document.getElementById('layer-' + id);
  if (!el) return;
  el.style.transition = animate ? 'transform 0.5s cubic-bezier(0.4,0,0.2,1)' : 'none';
  el.style.transform = `translateX(${x * 100}%)`;
}

function snapToLayer(active) {
  const pos = getAbsolutePositions(active);
  [1,2,3].forEach(id => placeLayer(id, pos[id]));
}

function doTransition(from, to) {
  const posFrom = getAbsolutePositions(from);
  const posTo = getAbsolutePositions(to);
  [1,2,3].forEach(id => placeLayer(id, posFrom[id]));
  [1,2,3].forEach(id => placeLayer(id, posTo[id], true));
  currentLayer = to;
}

function setLobbyLayer(to) {
  if (to === currentLayer) return;
  doTransition(currentLayer, to);
}

snapToLayer(2);

document.getElementById('lobby-menu')?.addEventListener('click', e => {
  const item = e.target.closest('.lobby-menu-item');
  if (!item) return;
  const menuId = item.dataset.menu;
  if (!menuId || menuId === activeMenu) return;

  // Quick Match langsung ke character select (contoh)
  if (menuId === 'quickmatch') {
    // Panggil fungsi character screen kalau ada
    // openCharacterScreen();
    return;
  }

  setLobbyLayer(menuLayerMap[menuId]);
  activeMenu = menuId;
});

// ── Touch Sound ──
const touchSound = new Audio('assets/soundfx/touch.mp3');
touchSound.preload = 'auto';
document.addEventListener('touchstart', () => {
  touchSound.currentTime = 0;
  touchSound.play().catch(() => {});
}, { passive: true });

</script>
</body>
</html>
