<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Crazy Bugs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Icons (tetap) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">

  <style>
    /* ── Keep only essential styles ── */
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      width:100%; height:100%;
      background:black; overflow:hidden;
      font-family:'Fredoka',sans-serif;
      color:white;
    }
    .screen {
      position:fixed; inset:0;
      opacity:0; pointer-events:none;
      transition:opacity 0.4s ease;
    }
    .screen.active { opacity:1; pointer-events:all; }

    /* Lobby layers */
    #lobby-layers {
      position:absolute; inset:0; overflow:hidden; z-index:2;
    }
    .lobby-layer {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; object-position:center;
      will-change:transform, filter;
    }

    /* Main menu content (keep your original lobby layout) */
    #screen-menu { z-index:1; }
    #menu-content { position:absolute; inset:0; z-index:10; }

    /* Bottom bar & other UI elements - keep as is */
    #lobby-bottom, .bar-left, .bar-center, .bar-right { /* your original styles */ }
    /* ... (copy-paste sisa style lobby, bottom bar, cards, dll dari source asli kamu) ... */

    /* Hilangkan style PIN, splash, loading, modal-dim awal, dll */
    #pin-modal, #tap-start, #screen-splash, #screen-black, #screen-load, #loading-ui { display:none !important; }
  </style>
</head>
<body>

  <!-- Hilangkan tap-start, pin-modal, splash, black, loading -->

  <!-- Langsung lobby screen -->
  <div id="screen-menu" class="screen active">
    <div id="lobby-layers">
      <img id="layer-1" class="lobby-layer" src="assets/layer1.png" alt="bg1">
      <img id="layer-2" class="lobby-layer" src="assets/layer2.png" alt="bg2">
      <img id="layer-3" class="lobby-layer" src="assets/layer3.png" alt="bg3">
    </div>

    <!-- Overlay khusus layer 2 (jika ada) -->
    <div id="layer2-overlay"> <!-- isi konten overlay jika ada --> </div>

    <div id="menu-content">
      <!-- Lobby kiri: menu Quick Match, Custom, Locker -->
      <div class="lobby-left" id="lobby-menu">
        <div class="lobby-menu-item" data-menu="quickmatch">
          <span class="menu-label">QUICK MATCH</span>
          <!-- pill & arrow muncul saat active -->
        </div>
        <div class="lobby-menu-item" data-menu="customgame">
          <span class="menu-label">CUSTOM GAME</span>
        </div>
        <div class="lobby-menu-item" data-menu="locker">
          <span class="menu-label">LOCKER</span>
        </div>
      </div>

      <!-- Center character -->
      <div class="lobby-center">
        <img src="assets/character.png" alt="char">
      </div>

      <!-- Right cards -->
      <div class="lobby-right">
        <!-- card item shop, event, dll -->
      </div>

      <!-- Bottom bar -->
      <div id="lobby-bottom">
        <div class="bar-left"> <!-- coin, gems, dll --> </div>
        <div class="bar-center"> <!-- confirm/back --> </div>
        <div class="bar-right"> <!-- profile, squad --> </div>
      </div>
    </div>
  </div>

  <!-- Keep modal lain jika mau: itemshop, friends, char selection, dll -->
  <!-- ... paste bagian modal yang masih diinginkan ... -->

  <script>
    // ── Hilangkan semua logic PIN, splash, loading, sequence ──
    // Langsung init lobby

    let currentLayer = 2;
    const menuLayerMap = { quickmatch: 2, customgame: 2, locker: 1 };

    function snapToLayer(active) {
      const pos = { 1: active===1 ? 0 : active===2 ? -1 : -2,
                    2: active===1 ? 1 : active===2 ? 0 : -1,
                    3: active===1 ? 2 : active===2 ? 1 : 0 };
      [1,2,3].forEach(id => {
        const el = document.getElementById('layer-'+id);
        if (el) el.style.transform = `translateX(${pos[id]*100}%)`;
      });
    }

    function setLobbyLayer(to) {
      // logic transisi sederhana (atau hapus jika tidak perlu swipe)
      currentLayer = to;
      snapToLayer(to);
    }

    // Init langsung lobby layer 2
    window.addEventListener('load', () => {
      snapToLayer(2);
      // Musik lobby (jika masih mau)
      // const lobbyMusic = new Audio('assets/audio/lobbyost.m4a');
      // lobbyMusic.loop = true; lobbyMusic.play().catch(()=>{}); 
    });

    // Event klik menu kiri (contoh)
    document.getElementById('lobby-menu')?.addEventListener('click', e => {
      const item = e.target.closest('.lobby-menu-item');
      if (!item) return;
      const menu = item.dataset.menu;
      setLobbyLayer(menuLayerMap[menu] || 2);
    });

    // Sisanya: event item shop, char select, dll tetap bisa dipakai
  </script>
</body>
</html>
